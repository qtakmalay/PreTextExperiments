<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="An 80-segment dragon that follows your cursor and parts text like water, powered by Pretext.">
  <title>Dragon — Pretext Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0a0a0c; color: #d0ccc4; height: 100vh; overflow: hidden; }
    body { font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif; }
    #stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; cursor: none; }
    .line {
      position: absolute; white-space: pre; z-index: 1; color: #c8c4bc;
      font: 18px/28px "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
      user-select: text; -webkit-user-select: text;
    }
    .dragon-seg {
      position: absolute; border-radius: 50%; pointer-events: none; z-index: 10;
      will-change: transform;
    }
    .eye { position: absolute; border-radius: 50%; pointer-events: none; z-index: 11; }
    .title {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 20;
      text-align: center; pointer-events: none;
    }
    .title h1 {
      font: 300 clamp(22px, 4vw, 36px)/1.2 Georgia, Palatino, serif;
      color: #22c55e; letter-spacing: 0.08em;
      text-shadow: 0 0 30px rgba(34, 197, 94, 0.2);
    }
    .title p {
      font: 400 11px/1.4 "Helvetica Neue", sans-serif;
      color: rgba(255,255,255,0.2); margin-top: 4px; letter-spacing: 0.06em;
    }
    .hint {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      font: 400 11px/1 "Helvetica Neue", sans-serif;
      color: rgba(255,255,255,0.15); z-index: 20; pointer-events: none;
    }
    .back {
      position: fixed; top: 20px; left: 16px;
      color: rgba(255,255,255,0.15); text-decoration: none;
      font: 12px "Helvetica Neue", sans-serif; z-index: 20;
    }
    .back:hover { color: #22c55e; }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div class="title">
    <h1>The Dragon</h1>
    <p>Move your cursor &middot; Click to breathe fire &middot; Zero DOM reads</p>
  </div>
  <a class="back" href="/demos">&larr; Demos</a>
  <div class="hint">Powered by @chenglou/pretext</div>

  <script type="module" src="./dragon.ts"></script>
</body>
</html>
